ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = [com.etherealnature.backend.ApplicationKt.module]
  }
}

cors {
  # Frontend dev origins; override per environment.
  allowedOrigins = ["http://localhost:3000", "http://localhost:3001"]
}

database {
  url = "jdbc:postgresql://localhost:5432/ethereal_nature"
  url = ${?DATABASE_URL}
  user = ${USER}
  user = ${?DATABASE_USER}
  password = ""
  password = ${?DATABASE_PASSWORD}
}
