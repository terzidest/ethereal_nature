ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = [com.etherealnature.backend.ApplicationKt.module]
  }
}

jwt {
  # Dev fallback only — set JWT_SECRET in any real environment.
  secret = "dev-only-secret-do-not-use-in-production"
  secret = ${?JWT_SECRET}
  issuer = "ethereal-nature"
  audience = "ethereal-nature-web"
  expiresInMinutes = 1440
}

admin {
  # Bootstrap ADMIN account, created at startup if missing.
  email = "admin@ethereal.dev"
  email = ${?ADMIN_EMAIL}
  password = "admin-dev-password"
  password = ${?ADMIN_PASSWORD}
}

cors {
  # Frontend dev origins; override per environment.
  allowedOrigins = ["http://localhost:3000", "http://localhost:3001"]
}

database {
  url = "jdbc:postgresql://localhost:5432/ethereal_nature"
  url = ${?DATABASE_URL}
  user = ${USER}
  user = ${?DATABASE_USER}
  password = ""
  password = ${?DATABASE_PASSWORD}
}
