name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: TS workspace (Turborepo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  backend:
    name: Backend (Gradle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ethereal
          POSTGRES_PASSWORD: ethereal
          POSTGRES_DB: ethereal_nature
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ethereal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: jdbc:postgresql://localhost:5432/ethereal_nature
      DATABASE_USER: ethereal
      DATABASE_PASSWORD: ethereal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew check
